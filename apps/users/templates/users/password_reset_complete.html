{% extends 'base.html' %}

{% block title %}Mot de passe modifié | PrimeShop{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh; padding: 2rem 1rem;">
    <div class="glass-panel" style="width: 100%; max-width: 460px; padding: 3rem 2.5rem; text-align: center; animation: fadeIn 0.5s ease-out;">
        
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" style="margin-bottom: 1.5rem;">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>

        <h1 style="font-size: 1.9rem; margin-bottom: 1rem;">Succès !</h1>
        <p style="color: var(--text-secondary); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem;">
            Votre mot de passe a été réinitialisé avec succès. Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.
        </p>

        <a href="{% url 'users:login' %}" class="btn btn-primary" style="width: 100%; padding: 0.85rem; border-radius: 10px;">
            Se connecter
        </a>
    </div>
</div>
{% endblock %}
